<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>阿瓦隆战绩 · 11人同步版</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#1A0F2A; font-family: system-ui, sans-serif; color:#FFF; padding:20px; max-width:800px; margin:auto; }
    h1,h2 { color:#FFD700; margin-bottom:0.5em; }
    .card { background: rgba(26,15,42,0.8); border:1px solid #7B5BA8; border-radius:12px; padding:20px; margin-bottom:20px; }
    select,input,button { background:#1F1535; color:#FFF; border:1px solid #7B5BA8; border-radius:8px; padding:8px 12px; margin:4px 0; font-size:14px; }
    button { background:#7B5BA8; font-weight:bold; cursor:pointer; }
    button:hover { background:#FFD700; color:#1A0F2A; }
    .grid-2col { display: grid; grid-template-columns: 1fr 1fr; gap:20px; }
    .player-chip { display:inline-block; background:#2a1f3a; border:1px solid #5A4BFF; border-radius:20px; padding:6px 12px; margin:4px; cursor:pointer; }
    .player-chip.active { background:#FFD700; color:#1A0F2A; }
    table { width:100%; border-collapse:collapse; margin-top:10px; }
    th,td { padding:10px 8px; border-bottom:1px solid #5A4BFF; text-align:center; }
    th { color:#FFD700; }
    .loading { color:#FFD700; text-align:center; }
    @media (max-width:768px) { .grid-2col { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <h1>⚔️ 阿瓦隆 · 11人同步战绩</h1>
  <div id="status" class="loading">⏳ 正在连接飞书云端数据...</div>

  <!-- 玩家管理 -->
  <div class="card">
    <h2>👥 玩家管理 (本地设置)</h2>
    <p style="color:#B8A9C9; margin-bottom:8px;">点击标记"常玩成员"（各人手机可独立设置）</p>
    <div id="playerList"></div>
  </div>

  <!-- 新增对局 -->
  <div class="card">
    <h2>📝 记录新对局</h2>
    <div class="grid-2col">
      <div>
        <label>日期：</label><br>
        <input type="date" id="gameDate" />
      </div>
      <div>
        <label>获胜阵营：</label><br>
        <select id="winnerTeam">
          <option value="好人">好人阵营</option>
          <option value="坏人">坏人阵营</option>
        </select>
      </div>
    </div>
    <p style="margin-top:10px;"><strong>本局参与者（自动使用全部活跃玩家）：</strong></p>
    <div id="selectedPlayers" style="margin:8px 0; color:#B8A9C9;"></div>
    <button id="addGameBtn">✅ 记录这局（同步到云端）</button>
    <button id="refreshBtn" style="margin-left:8px;">🔄 手动刷新数据</button>
    <span style="margin-left:12px; font-size:12px; color:#6B5B8C;">共 <span id="totalGames">0</span> 场</span>
  </div>

  <!-- 战力排行 & 个人详情 -->
  <div class="grid-2col">
    <div class="card">
      <h2>🏆 战力排行榜</h2>
      <table>
        <thead><tr><th>排名</th><th>玩家</th><th>场次</th><th>胜率</th><th>战力值</th></tr></thead>
        <tbody id="rankBody"></tbody>
      </table>
    </div>
    <div class="card">
      <h2>📊 个人统计详情</h2>
      <select id="playerSelect" style="width:100%; margin-bottom:10px;">
        <option value="">-- 选择玩家 --</option>
      </select>
      <div id="playerDetail"></div>
    </div>
  </div>

  <!-- 最近对局 -->
  <div class="card">
    <h2>📋 最近10局记录（云端数据）</h2>
    <div id="gameHistory" style="max-height:300px; overflow-y:auto;"></div>
  </div>

  <script>
    // ========== 🔧 你的飞书配置（已填入） ==========
    const FEISHU = {
      baseId: 'KUFywjulLiHK0ckJuHDcMh2ynko',   // app_token（从URL提取）
      tableId: 'tblI5guGXQAkzcNj',            // table_id（从URL提取）
      token: 'pt-e-ny4SxNCio9i8Flr3ZnuRMdZldfptB7ZuYR8GmdAQAABIBAVNXLQwRQR9jR'  // PersonalBaseToken（你提供的授权码）
    };
    // ===========================================

    // 初始11位玩家（你可随意修改名字）
    const defaultPlayers = [
      "亚瑟", "梅林", "派西维尔", "兰斯洛特", "莫甘娜",
      "刺客", "奥伯伦", "莫德雷德", "忠臣A", "忠臣B", "游客"
    ];

    // 从本地存储读取玩家设置（常玩标记）
    let players = JSON.parse(localStorage.getItem('avalon_players')) || defaultPlayers.map((name, idx) => ({
      id: idx,
      name: name,
      regular: idx < 10  // 前10位默认常玩
    }));

    // 云端对局缓存
    let games = [];

    // ---------- 本地玩家管理 ----------
    function savePlayers() {
      localStorage.setItem('avalon_players', JSON.stringify(players));
    }

    function getPlayer(id) { return players.find(p => p.id === id); }

    function renderPlayerList() {
      document.getElementById('playerList').innerHTML = players.map(p => `
        <span class="player-chip ${p.regular ? 'active' : ''}" onclick="togglePlayer(${p.id})">
          ${p.name} ${p.regular ? '✓' : ''}
        </span>
      `).join('');
      updateSelectedPlayers();
      renderPlayerSelect();
    }

    function togglePlayer(id) {
      const p = players.find(p => p.id === id);
      if (p) p.regular = !p.regular;
      savePlayers();
      renderPlayerList();
      renderAllStats();
    }

    function updateSelectedPlayers() {
      const actives = players.filter(p => p.regular);
      document.getElementById('selectedPlayers').innerText = 
        actives.length ? actives.map(p => p.name).join('、') : '未选择常玩成员';
    }

    function renderPlayerSelect() {
      const sel = document.getElementById('playerSelect');
      const actives = players.filter(p => p.regular);
      sel.innerHTML = '<option value="">-- 选择玩家 --</option>' + 
        actives.map(p => `<option value="${p.id}">${p.name}</option>`).join('');
    }

    // ---------- 飞书 API 操作 ----------
    async function fetchGames() {
      document.getElementById('status').innerText = '🔄 正在从飞书拉取对局记录...';
      let allRecords = [];
      let pageToken = null;
      try {
        do {
          let url = `https://open.feishu.cn/open-apis/bitable/v1/apps/${FEISHU.baseId}/tables/${FEISHU.tableId}/records?page_size=200`;
          if (pageToken) url += `&page_token=${pageToken}`;
          const res = await fetch(url, {
            headers: {
              'Authorization': `Bearer ${FEISHU.token}`,
              'Content-Type': 'application/json'
            }
          });
          const data = await res.json();
          if (data.code !== 0) throw new Error(data.msg || '飞书请求失败');
          allRecords = allRecords.concat(data.data.items || []);
          pageToken = data.data.has_more ? data.data.page_token : null;
        } while (pageToken);

        // 转换飞书数据为我们需要的格式
        games = allRecords.map(rec => {
          const f = rec.fields;
          return {
            id: rec.record_id,
            date: f['日期'] || '',
            winner: f['获胜阵营'] || '',
            players: f['参与玩家'] || []  // 飞书多选直接返回名字数组
          };
        });

        document.getElementById('status').innerText = `✅ 已同步 ${games.length} 场对局`;
      } catch (err) {
        document.getElementById('status').innerText = '❌ 加载失败，请检查：1.飞书Token是否正确 2.网络是否通畅';
        console.error('飞书加载错误：', err);
      }
      renderAllStats();
    }

    async function addGameToFeishu(gameData) {
      const body = {
        fields: {
          '日期': gameData.date,
          '获胜阵营': gameData.winner,
          '参与玩家': gameData.players  // 直接传名字数组，飞书多选字段接收
        }
      };
      try {
        const res = await fetch(`https://open.feishu.cn/open-apis/bitable/v1/apps/${FEISHU.baseId}/tables/${FEISHU.tableId}/records`, {
          method: 'POST',
          headers: {
            'Authorization': `Bearer ${FEISHU.token}`,
            'Content-Type': 'application/json'
          },
          body: JSON.stringify(body)
        });
        const data = await res.json();
        if (data.code !== 0) throw new Error(data.msg);
        return true;
      } catch (err) {
        alert('上传到飞书失败：' + err.message);
        return false;
      }
    }

    // ---------- 战力计算 (ELO简化) ----------
    function calculateELO() {
      const eloMap = {};
      players.forEach(p => eloMap[p.id] = 1000);
      
      // 按日期正序计算（旧局先算）
      const sorted = [...games].sort((a,b) => a.date.localeCompare(b.date));
      sorted.forEach(game => {
        const names = game.players; // 这是玩家名字的数组，需要转成id
        const ids = names.map(name => {
          const found = players.find(p => p.name === name);
          return found ? found.id : null;
        }).filter(id => id !== null);
        if (ids.length < 2) return;
        
        // 简化阵营分配：按索引奇偶分
        const blueIds = ids.filter((_, idx) => idx % 2 === 0);
        const redIds = ids.filter((_, idx) => idx % 2 !== 0);
        
        const avgBlue = blueIds.reduce((sum,id) => sum + (eloMap[id]||1000), 0) / blueIds.length;
        const avgRed = redIds.reduce((sum,id) => sum + (eloMap[id]||1000), 0) / redIds.length;
        
        const expectedBlue = 1 / (1 + Math.pow(10, (avgRed - avgBlue) / 400));
        const K = 16;
        const scoreChange = game.winner === '好人' ? K * (1 - expectedBlue) : K * (0 - expectedBlue);
        
        blueIds.forEach(id => eloMap[id] = (eloMap[id]||1000) + scoreChange);
        redIds.forEach(id => eloMap[id] = (eloMap[id]||1000) - scoreChange);
      });
      return eloMap;
    }

    function getPlayerStats(playerName) {
      const playerGames = games.filter(g => g.players.includes(playerName));
      const wins = playerGames.filter(g => {
        const idx = g.players.indexOf(playerName);
        // 假设奇偶决定阵营：偶数好，奇数坏（与ELO一致）
        const isBlue = (idx % 2 === 0);
        return (g.winner === '好人' && isBlue) || (g.winner === '坏人' && !isBlue);
      }).length;
      return {
        total: playerGames.length,
        wins: wins,
        winRate: playerGames.length ? (wins / playerGames.length * 100).toFixed(1) : 0
      };
    }

    // ---------- 渲染界面 ----------
    function renderAllStats() {
      if (!games.length) {
        document.getElementById('rankBody').innerHTML = '<tr><td colspan="5">暂无对局</td></tr>';
        document.getElementById('gameHistory').innerHTML = '<p>暂无记录</p>';
        document.getElementById('totalGames').innerText = 0;
        return;
      }

      const eloMap = calculateELO();
      const activePlayers = players.filter(p => p.regular);
      
      // 排行榜
      const sorted = [...activePlayers].sort((a,b) => (eloMap[b.id]||1000) - (eloMap[a.id]||1000));
      document.getElementById('rankBody').innerHTML = sorted.map((p, idx) => {
        const stats = getPlayerStats(p.name);
        return `<tr>
          <td style="color:#FFD700;">#${idx+1}</td>
          <td>${p.name}</td>
          <td>${stats.total}</td>
          <td>${stats.winRate}%</td>
          <td>${Math.round(eloMap[p.id])}</td>
        </tr>`;
      }).join('');

      // 最近对局
      const recent = [...games].slice(-10).reverse();
      document.getElementById('gameHistory').innerHTML = recent.map(g => {
        return `<div style="margin-bottom:6px; padding:6px; background:#1F1535; border-radius:8px;">
          <strong>${g.date}</strong> | ${g.winner==='好人'?'🔵好人胜':'🔴坏人胜'} | 参与者: ${g.players.join(', ')}
        </div>`;
      }).join('');

      document.getElementById('totalGames').innerText = games.length;
      updateSelectedPlayers();
    }

    // 点击"选择玩家"下拉框查看详情
    document.getElementById('playerSelect').addEventListener('change', (e) => {
      const id = parseInt(e.target.value);
      if (!id) {
        document.getElementById('playerDetail').innerHTML = '';
        return;
      }
      const p = getPlayer(id);
      if (!p) return;
      const stats = getPlayerStats(p.name);
      const eloMap = calculateELO();
      document.getElementById('playerDetail').innerHTML = `
        <h3 style="color:#FFD700;">${p.name}</h3>
        <p>📅 总场次: <strong>${stats.total}</strong></p>
        <p>🏅 胜场: <strong>${stats.wins}</strong> (胜率 ${stats.winRate}%)</p>
        <p>⚡ 战力值: <strong>${Math.round(eloMap[id])}</strong></p>
        <p style="font-size:12px; color:#6B5B8C;">（阵营基于参与顺序模拟，非真实身份）</p>
      `;
    });

    // 添加对局按钮
    document.getElementById('addGameBtn').addEventListener('click', async () => {
      const actives = players.filter(p => p.regular);
      if (actives.length < 5) {
        alert('至少需要5名活跃玩家');
        return;
      }
      const winner = document.getElementById('winnerTeam').value;
      const date = document.getElementById('gameDate').value || new Date().toISOString().split('T')[0];
      const playerNames = actives.map(p => p.name);
      
      const success = await addGameToFeishu({
        date: date,
        winner: winner,
        players: playerNames
      });
      if (success) {
        // 直接重新拉取云端数据确保一致
        await fetchGames();
      }
    });

    // 手动刷新按钮
    document.getElementById('refreshBtn').addEventListener('click', fetchGames);

    // 初始化
    document.getElementById('gameDate').valueAsDate = new Date();
    renderPlayerList();
    fetchGames();  // 页面打开自动拉取飞书数据
  </script>
</body>
</html>
